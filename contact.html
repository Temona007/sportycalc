      <h1>Contact Us</h1>
      <p class="hero-desc">Have a question or feedback?<br/>Send us a message or email us at <a href="mailto:temona007@gmail.com">temona007@gmail.com</a>.</p>
    </section>

    <section class="contact-section">
      <div class="contact-form-card">
        <form id="contact-form" action="https://formspree.io/f/mkovzljw" method="POST">
          <div class="input-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required placeholder="Your name">
          </div>
          <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="your@email.com">
          </div>
          <div class="input-group">
            <label for="subject">Subject</label>
            <select id="subject" name="subject">
              <option value="general">General question</option>
              <option value="calculator">Calculator feedback</option>
              <option value="bug">Bug report</option>
              <option value="feature">Feature request</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="input-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required placeholder="Your question or feedback..."></textarea>
          </div>
          <button type="submit" class="calc-btn">Send Message</button>
        </form>
      </div>
    </section>
